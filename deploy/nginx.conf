# Resound-Player — Nginx Production Configuration
# 
# Usage:
#   sudo nginx -c /path/to/deploy/nginx.conf
#   or place in /etc/nginx/sites-available/resound-player and symlink
#
# Assumes:
#   - Built frontend at /var/www/resound-player/dist
#   - Netease API server running on 127.0.0.1:38761
#   - Unblock match server running on 127.0.0.1:38763
#   - Unblock proxy server running on 127.0.0.1:38762
#   - SSL certs at /etc/letsencrypt/live/your-domain (or custom path)

upstream netease_api {
    server 127.0.0.1:38761;
    keepalive 64;
}

upstream unblock_match {
    server 127.0.0.1:38763;
    keepalive 16;
}

# HTTP → HTTPS redirect (uncomment when SSL is configured)
# server {
#     listen 80;
#     server_name your-domain.com;
#     return 301 https://$host$request_uri;
# }

# server {
#     listen 443 ssl http2;
#     server_name your-domain.com;

server {
    listen 80;
    server_name _;

    # ── SSL (uncomment and configure when certs are ready) ──
    # ssl_certificate     /etc/letsencrypt/live/your-domain/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/your-domain/privkey.pem;
    # ssl_protocols       TLSv1.2 TLSv1.3;
    # ssl_ciphers         HIGH:!aNULL:!MD5;

    root /var/www/resound-player/dist;
    index index.html;

    # ── Gzip ──
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/x-javascript
        image/svg+xml
        image/x-icon
        font/woff
        font/woff2;

    # ── Security headers ──
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Static assets with content hash: long cache ──
    location ~* \.(js|css|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── Images, fonts, media: medium cache ──
    location ~* \.(png|jpg|jpeg|gif|webp|svg|ico|mp3|mp4|ogg|wav)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── SPA fallback: all unmatched routes serve index.html ──
    location / {
        # Don't rewrite requests for real files
        try_files $uri $uri/ /index.html;
    }

    # ── /dl-proxy: audio proxy with CORS + Range/206 support ──
    # Handled by unblock match server (Node.js, handles URL decoding internally)
    location /dl-proxy {
        proxy_pass http://unblock_match/dl-proxy;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Range $http_range;
        proxy_set_header If-Range $http_if_range;

        proxy_connect_timeout 15s;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_buffering off;
        proxy_cache off;
    }

    # ── API proxy: NeteaseCloudMusicApiEnhanced ──
    location /api/ {
        proxy_pass http://netease_api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
        proxy_pass_header Set-Cookie;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
        proxy_send_timeout 30s;

        # No buffering for SSE/streaming responses
        proxy_buffering off;
        proxy_cache off;
    }

    # ── Unblock match API proxy ──
    location /unblock-api/ {
        proxy_pass http://unblock_match/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
        proxy_send_timeout 30s;

        proxy_buffering off;
        proxy_cache off;
    }

    # ── Deny access to hidden files ──
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── Large client body for API requests ──
    client_max_body_size 10m;
}