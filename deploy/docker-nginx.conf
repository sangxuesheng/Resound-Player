# Resound-Player — Complete Nginx Config for Docker
#
# This is a standalone nginx.conf for the Docker Compose deployment.
# For non-Docker (system Nginx) deployment, use nginx.conf instead.

worker_processes auto;
pid /tmp/nginx.pid;

events {
    worker_connections 2048;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Basic settings ──
    sendfile       on;
    tcp_nopush     on;
    tcp_nodelay    on;
    keepalive_timeout  65;
    server_tokens  off;
    client_max_body_size 10m;

    # ── Gzip ──
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/x-javascript
        image/svg+xml
        image/x-icon
        font/woff
        font/woff2;

    # ── Upstreams ──
    upstream netease_api {
        server netease-api:38761;
        keepalive 64;
    }
    upstream unblock_match {
        server unblock:38763;
        keepalive 16;
    }

    server {
        listen 80;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        # ── Security headers ──
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # ── Static assets with hash: long cache ──
        location ~* \.(js|css|woff2?)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        # ── Images, fonts, media: medium cache ──
        location ~* \.(png|jpg|jpeg|gif|webp|svg|ico|mp3|mp4|ogg|wav)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        # ── SPA fallback ──
        location / {
            try_files $uri $uri/ /index.html;
        }

        # ── /dl-proxy: audio proxy with CORS + Range/206 ──
        # Handled by unblock match server (Node.js, auto-decodes URL params)
        location /dl-proxy {
            proxy_pass http://unblock_match/dl-proxy;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Range $http_range;
            proxy_set_header If-Range $http_if_range;

            proxy_connect_timeout 15s;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
            proxy_buffering off;
            proxy_cache off;
        }

        # ── API proxy ──
        location /api/ {
            proxy_pass http://netease_api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Cookie $http_cookie;
            proxy_pass_header Set-Cookie;

            proxy_connect_timeout 10s;
            proxy_read_timeout 60s;
            proxy_send_timeout 30s;
            proxy_buffering off;
            proxy_cache off;
        }

        # ── Unblock match API proxy ──
        location /unblock-api/ {
            proxy_pass http://unblock_match/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 10s;
            proxy_read_timeout 60s;
            proxy_send_timeout 30s;
            proxy_buffering off;
            proxy_cache off;
        }

        # ── Deny hidden files ──
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
    }
}