# Gemini Music — 宝塔面板 Nginx 配置
#
# 用法：
#   1. 宝塔面板 → 网站 → 添加站点
#      域名：你的域名（或服务器 IP）
#      根目录：/www/wwwroot/gemini-music/dist
#      PHP版本：纯静态
#   2. 创建完成后 → 网站设置 → 配置文件
#   3. 用本文件内容替换默认配置，保存后重载 Nginx
#
# 前提：
#   - 代码已克隆到 /www/wwwroot/gemini-music
#   - 已执行 npm ci && VITE_BASE_URL=/ npm run build:web
#   - 后端服务已在 PM2 管理器中启动（指向 deploy/ecosystem.config.cjs）
#   - Netease API 运行在 127.0.0.1:38761
#   - Unblock Match 运行在 127.0.0.1:38763
#   - Unblock Proxy 运行在 127.0.0.1:38762

server
{
    listen 80;
    server_name _;
    index index.html;
    root  /www/wwwroot/gemini-music/dist;

    # ── Gzip ──
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml
        image/x-icon
        font/woff
        font/woff2;

    # ── Security headers ──
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Static assets with content hash: long cache ──
    location ~* \.(js|css|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── Images, fonts, media: medium cache ──
    location ~* \.(png|jpg|jpeg|gif|webp|svg|ico|mp3|mp4|ogg|wav)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── API proxy: NeteaseCloudMusicApiEnhanced (:38761) ──
    location /api/ {
        proxy_pass http://127.0.0.1:38761/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
        proxy_pass_header Set-Cookie;
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
        proxy_send_timeout 30s;
        proxy_buffering off;
        proxy_cache off;
    }

    # ── Unblock match API proxy (:38763) ──
    location /unblock-api/ {
        proxy_pass http://127.0.0.1:38763/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
        proxy_send_timeout 30s;
        proxy_buffering off;
        proxy_cache off;
    }

    # ── /dl-proxy: audio proxy with CORS + Range/206 support ──
    # Handled by unblock match server
    location /dl-proxy {
        proxy_pass http://127.0.0.1:38763;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Range $http_range;
        proxy_set_header If-Range $http_if_range;
        proxy_connect_timeout 15s;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_buffering off;
        proxy_cache off;
    }

    # ── SPA fallback ──
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Deny hidden files ──
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── Large client body for API requests ──
    client_max_body_size 10m;
}